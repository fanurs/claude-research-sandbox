<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Log Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
  .topbar select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; font-size: 14px; cursor: pointer; }
  .topbar select:hover { border-color: #58a6ff; }
  .topbar .meta { font-size: 12px; color: #8b949e; display: flex; gap: 16px; flex-wrap: wrap; }
  .topbar .meta span { white-space: nowrap; }
  .topbar .badge { background: #1f6feb; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .topbar .badge.live { background: #da3633; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Messages area */
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }

  /* Message cards */
  .msg { border-radius: 8px; padding: 10px 14px; max-width: 100%; line-height: 1.5; font-size: 14px; }
  .msg-init { background: #1c2333; border: 1px solid #30363d; text-align: center; font-size: 12px; color: #8b949e; }
  .msg-init .model { color: #58a6ff; font-weight: 600; }
  .msg-text { background: #1c2a3a; border-left: 3px solid #58a6ff; }
  .msg-text .markdown { line-height: 1.6; }
  .msg-text .markdown h1, .msg-text .markdown h2, .msg-text .markdown h3 { color: #e6edf3; margin: 12px 0 6px; }
  .msg-text .markdown h1 { font-size: 1.3em; }
  .msg-text .markdown h2 { font-size: 1.15em; }
  .msg-text .markdown h3 { font-size: 1.05em; }
  .msg-text .markdown p { margin: 6px 0; }
  .msg-text .markdown ul, .msg-text .markdown ol { margin: 6px 0 6px 20px; }
  .msg-text .markdown code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg-text .markdown pre { background: #161b22; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
  .msg-text .markdown pre code { padding: 0; background: none; }
  .msg-text .markdown table { border-collapse: collapse; margin: 8px 0; width: 100%; }
  .msg-text .markdown th, .msg-text .markdown td { border: 1px solid #30363d; padding: 6px 10px; text-align: left; }
  .msg-text .markdown th { background: #161b22; }
  .msg-text .markdown strong { color: #e6edf3; }
  .msg-text .markdown a { color: #58a6ff; }
  .msg-text .markdown blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: 8px 0; }

  .msg-tool-use { background: #1a1e24; border-left: 3px solid #f0883e; padding: 6px 12px; }
  .msg-tool-result { background: #141820; border-left: 3px solid #30363d; padding: 6px 12px; }
  .msg-thinking { background: #1a1a2e; border-left: 3px solid #a371f7; padding: 6px 12px; }
  .msg-system { background: transparent; text-align: center; font-size: 12px; color: #6e7681; padding: 4px; }
  .msg-result { background: #1c2333; border: 1px solid #30363d; padding: 14px; }
  .msg-rate-limit { background: #2d1b00; border-left: 3px solid #d29922; font-size: 12px; padding: 4px 12px; }

  .msg.subagent { margin-left: 24px; border-left-width: 3px; opacity: 0.85; }

  /* Tool badges */
  .tool-name { display: inline-block; background: #2d333b; color: #f0883e; padding: 1px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; font-weight: 600; margin-right: 6px; }
  .tool-result-label { color: #8b949e; font-size: 12px; }

  /* Details/collapse */
  details { margin-top: 4px; }
  details summary { cursor: pointer; color: #8b949e; font-size: 12px; user-select: none; }
  details summary:hover { color: #c9d1d9; }
  details pre { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 10px; margin-top: 6px; overflow-x: auto; font-size: 12px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

  /* Result footer */
  .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 10px; }
  .result-stat { background: #0d1117; border-radius: 6px; padding: 8px 12px; text-align: center; }
  .result-stat .label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
  .result-stat .value { font-size: 18px; font-weight: 600; color: #58a6ff; margin-top: 2px; }
  .result-summary { margin-top: 10px; }

  /* Empty state */
  .empty { text-align: center; color: #6e7681; padding: 40px; font-size: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<div class="topbar">
  <select id="file-select"><option>Loading...</option></select>
  <span id="live-badge"></span>
  <div class="meta" id="session-meta"></div>
</div>

<div id="messages">
  <div class="empty">Select a session log to view</div>
</div>

<script>
const fileSelect = document.getElementById('file-select');
const messagesEl = document.getElementById('messages');
const sessionMeta = document.getElementById('session-meta');
const liveBadge = document.getElementById('live-badge');

let currentFile = null;
let lineCount = 0;
let pollTimer = null;
let files = [];
let toolMap = new Map(); // tool_use_id -> tool_name

// Configure marked
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

// --- API ---
async function fetchFiles() {
  const res = await fetch('/api/files');
  return res.json();
}

async function fetchLines(filename, offset = 0) {
  const res = await fetch(`/api/lines/${filename}?offset=${offset}`);
  return res.json();
}

// --- Init ---
async function init() {
  files = await fetchFiles();
  fileSelect.innerHTML = '';
  for (const f of files) {
    const opt = document.createElement('option');
    const date = f.name.replace('session_', '').replace('.json', '').replace(/_/g, ' ');
    const sizeKB = (f.size / 1024).toFixed(0);
    opt.value = f.name;
    opt.textContent = `${date}  (${sizeKB} KB)`;
    fileSelect.appendChild(opt);
  }
  if (files.length > 0) {
    loadFile(files[0].name);
  }
}

fileSelect.addEventListener('change', () => loadFile(fileSelect.value));

async function loadFile(filename) {
  currentFile = filename;
  lineCount = 0;
  toolMap.clear();
  messagesEl.innerHTML = '';
  sessionMeta.innerHTML = '';
  liveBadge.innerHTML = '';

  if (pollTimer) clearInterval(pollTimer);

  const data = await fetchLines(filename, 0);
  lineCount = data.total;
  for (const line of data.lines) {
    appendLine(line);
  }

  // If this is the newest file, start polling
  const isLatest = files.length > 0 && filename === files[0].name;
  if (isLatest) {
    liveBadge.innerHTML = '<span class="badge live">LIVE</span>';
    pollTimer = setInterval(() => poll(filename), 2000);
  } else {
    liveBadge.innerHTML = '';
  }

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function poll(filename) {
  if (currentFile !== filename) return;
  try {
    const data = await fetchLines(filename, lineCount);
    if (data.lines.length === 0) return;

    const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150;
    lineCount = data.total;
    for (const line of data.lines) {
      appendLine(line);
    }
    if (nearBottom) {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  } catch {}
}

// --- Rendering ---
function esc(str) {
  if (typeof str !== 'string') str = JSON.stringify(str, null, 2) || '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function truncate(str, max = 200) {
  if (typeof str !== 'string') str = JSON.stringify(str, null, 2) || '';
  if (str.length <= max) return str;
  return str.slice(0, max) + '...';
}

function formatDuration(ms) {
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const min = Math.floor(ms / 60000);
  const sec = Math.round((ms % 60000) / 1000);
  return `${min}m ${sec}s`;
}

function appendLine(obj) {
  const el = document.createElement('div');
  el.className = 'msg';

  const isSubagent = obj.parent_tool_use_id != null;
  if (isSubagent) el.classList.add('subagent');

  const type = obj.type;
  const subtype = obj.subtype || '';

  if (type === 'system' && subtype === 'init') {
    el.classList.add('msg-init');
    el.innerHTML = `
      <span class="model">${esc(obj.model || '')}</span> &middot;
      Session <code>${esc((obj.session_id || '').slice(0, 8))}</code> &middot;
      ${esc(obj.cwd || '')} &middot;
      v${esc(obj.claude_code_version || '?')} &middot;
      ${(obj.tools || []).length} tools
    `;
    sessionMeta.innerHTML = `<span>${esc(obj.model || '')}</span>`;

  } else if (type === 'result') {
    el.classList.add('msg-result');
    const dur = obj.duration_ms ? formatDuration(obj.duration_ms) : '?';
    const cost = obj.total_cost_usd != null ? '$' + obj.total_cost_usd.toFixed(2) : '?';
    const turns = obj.num_turns || '?';
    el.innerHTML = `
      <div class="result-grid">
        <div class="result-stat"><div class="label">Duration</div><div class="value">${dur}</div></div>
        <div class="result-stat"><div class="label">Cost</div><div class="value">${cost}</div></div>
        <div class="result-stat"><div class="label">Turns</div><div class="value">${turns}</div></div>
        <div class="result-stat"><div class="label">Status</div><div class="value">${esc(subtype)}</div></div>
      </div>
      ${obj.result ? '<div class="result-summary markdown">' + marked.parse(obj.result) + '</div>' : ''}
    `;
    // Update meta
    const metaParts = [sessionMeta.innerHTML];
    metaParts.push(`<span>${dur}</span><span>${cost}</span><span>${turns} turns</span>`);
    sessionMeta.innerHTML = metaParts.join('');
    // Stop live badge
    liveBadge.innerHTML = '';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

  } else if (type === 'assistant' && obj.message) {
    const content = obj.message.content || [];
    for (const block of content) {
      if (block.type === 'text' && block.text) {
        const textEl = document.createElement('div');
        textEl.className = `msg msg-text${isSubagent ? ' subagent' : ''}`;
        textEl.innerHTML = '<div class="markdown">' + marked.parse(block.text) + '</div>';
        messagesEl.appendChild(textEl);
        // Highlight code blocks
        textEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      } else if (block.type === 'tool_use') {
        toolMap.set(block.id, block.name);
        const inputStr = JSON.stringify(block.input, null, 2);
        const summary = formatToolSummary(block.name, block.input);
        const toolEl = document.createElement('div');
        toolEl.className = `msg msg-tool-use${isSubagent ? ' subagent' : ''}`;
        toolEl.innerHTML = `
          <span class="tool-name">${esc(block.name)}</span> ${esc(summary)}
          ${inputStr.length > 80 ? `<details><summary>Full input</summary><pre>${esc(inputStr)}</pre></details>` : ''}
        `;
        messagesEl.appendChild(toolEl);
      } else if (block.type === 'thinking') {
        if (!block.text) continue; // skip empty thinking
        const thinkEl = document.createElement('div');
        thinkEl.className = `msg msg-thinking${isSubagent ? ' subagent' : ''}`;
        thinkEl.innerHTML = `<details><summary>Thinking...</summary><pre>${esc(block.text)}</pre></details>`;
        messagesEl.appendChild(thinkEl);
      } else {
        // Unknown content block type — render raw so nothing is lost
        const rawEl = document.createElement('div');
        rawEl.className = `msg msg-system${isSubagent ? ' subagent' : ''}`;
        rawEl.innerHTML = `<details><summary>[${esc(block.type || 'unknown')}]</summary><pre>${esc(JSON.stringify(block, null, 2))}</pre></details>`;
        messagesEl.appendChild(rawEl);
      }
    }
    return; // already appended individual blocks

  } else if (type === 'user' && obj.message) {
    const content = obj.message.content || [];
    for (const block of content) {
      if (block.type === 'tool_result') {
        const toolName = toolMap.get(block.tool_use_id) || 'Unknown';
        const resultStr = typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2);
        const preview = truncate(resultStr, 120);
        const resEl = document.createElement('div');
        resEl.className = `msg msg-tool-result${isSubagent ? ' subagent' : ''}`;
        resEl.innerHTML = `
          <span class="tool-result-label">Result for</span> <span class="tool-name">${esc(toolName)}</span>
          <span style="color:#6e7681;font-size:12px">${esc(preview)}</span>
          ${resultStr.length > 120 ? `<details><summary>Full output (${(resultStr.length/1024).toFixed(1)} KB)</summary><pre>${esc(resultStr)}</pre></details>` : ''}
        `;
        messagesEl.appendChild(resEl);
      } else {
        // Unknown user content block — render raw
        const rawEl = document.createElement('div');
        rawEl.className = `msg msg-system${isSubagent ? ' subagent' : ''}`;
        rawEl.innerHTML = `<details><summary>[user: ${esc(block.type || 'unknown')}]</summary><pre>${esc(JSON.stringify(block, null, 2))}</pre></details>`;
        messagesEl.appendChild(rawEl);
      }
    }
    return;

  } else if (type === 'system' && (subtype === 'task_progress' || subtype === 'task_started' || subtype === 'task_notification')) {
    el.classList.add('msg-system');
    const desc = obj.description || subtype;
    const tool = obj.last_tool_name ? ` (${obj.last_tool_name})` : '';
    el.textContent = `[${subtype}] ${desc}${tool}`;

  } else if (type === 'rate_limit_event') {
    el.classList.add('msg-rate-limit');
    el.textContent = `Rate limited — waiting...`;

  } else {
    // Unknown or unhandled type — always show raw JSON so nothing is silently lost
    el.classList.add('msg-system');
    el.innerHTML = `<details><summary>[${esc(type)}${subtype ? '/' + esc(subtype) : ''}]</summary><pre>${esc(JSON.stringify(obj, null, 2))}</pre></details>`;
  }

  messagesEl.appendChild(el);
}

function formatToolSummary(name, input) {
  switch (name) {
    case 'Read': return input.file_path || '';
    case 'Write': return input.file_path || '';
    case 'Edit': return input.file_path || '';
    case 'Glob': return input.pattern || '';
    case 'Grep': return `"${input.pattern || ''}"` + (input.path ? ` in ${input.path}` : '');
    case 'Bash': return truncate(input.command || '', 100);
    case 'WebSearch': return `"${input.query || ''}"`;
    case 'WebFetch': return input.url || '';
    case 'Agent': return input.description || '';
    case 'TodoWrite': return '';
    case 'Task': return input.description || '';
    default: return truncate(JSON.stringify(input), 80);
  }
}

init();
</script>
</body>
</html>
